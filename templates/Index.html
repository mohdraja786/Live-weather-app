<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लाइव वेदर ऐप</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* डिफ़ॉल्ट बैकग्राउंड */
        body {
            background: linear-gradient(to right, #4ca1af, #2c3e50);
            color: white;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.8s ease; /* बैकग्राउंड बदलने का स्मूथ इफ़ेक्ट */
        }
        /* धूप वाले मौसम के लिए */
        body.sunny {
            background: linear-gradient(to right, #f7b733, #fc4a1a) !important;
        }
        /* बारिश के लिए */
        body.rainy {
            background: linear-gradient(to right, #3a7bd5, #3a6073) !important;
        }
        /* बादलों के लिए */
        body.cloudy {
            background: linear-gradient(to right, #bdc3c7, #2c3e50) !important;
        }
        
        .weather-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 15px;
        }
        .btn-search {
            background-color: #ff6b6b;
            color: white;
            border: none;
        }
        .btn-search:hover {
            background-color: #ff5252;
            color: white;
        }
    </style>
</head>
<body>

<div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh;">
    
    <div class="text-center mb-4 text-white">
        <h1 class="fw-bold">🌤️ Live Weather App</h1>
        <p class="text-white-50">किसी भी शहर का लाइव मौसम तुरंत जानें</p>
    </div>

    <div class="col-md-6 w-100" style="max-width: 500px;">
        <div class="bg-white p-3 rounded-pill shadow mb-4">
            <form action="/" method="POST" class="d-flex">
                <input type="text" name="city" class="form-control border-0 rounded-pill px-3 text-dark" placeholder="शहर का नाम लिखें (e.g. Muzaffarpur)..." required>
                <button type="submit" class="btn btn-search rounded-pill px-4 ms-2 fw-bold">Search</button>
            </form>
        </div>

        {% if error %}
        <div class="alert alert-danger text-center rounded-pill shadow-sm" role="alert">
            ❌ {{ error }}
        </div>
        {% endif %}

        {% if weather %}
        <div class="weather-card p-4 text-center shadow-lg">
            <h2 class="fw-bold mb-1">{{ weather.city.title() }}</h2>
            <p class="text-white-50 mb-4">मौसम का हाल</p>
            
            <div class="display-1 fw-bold mb-2">{{ weather.temp }}</div>
            <h4 id="weatherDesc" class="text-capitalize mb-4">✨ {{ weather.desc }}</h4>
            
            <hr style="border-top: 1px solid rgba(255,255,255,0.2);">
            
            <div class="row mt-3">
                <div class="col-12">
                    <span class="text-white-50 small d-block">नमी (Humidity)</span>
                    <span class="fw-bold fs-5">💧 {{ weather.humidity }}</span>
                </div>
            </div>
        </div>
        {% endif %}
    </div>

</div>

<script>
    const descElement = document.getElementById('weatherDesc');
    if (descElement) {
        const descText = descElement.innerText.toLowerCase();
        
        // मौसम के शब्दों के हिसाब से बॉडी पर क्लास लगाना
        if (descText.includes('sun') || descText.includes('clear')) {
            document.body.classList.add('sunny');
        } else if (descText.includes('rain') || descText.includes('shower') || descText.includes('drizzle')) {
            document.body.classList.add('rainy');
        } else if (descText.includes('cloud') || descText.includes('overcast') || descText.includes('mist') || descText.includes('fog')) {
            document.body.classList.add('cloudy');
        }
    }
</script>

</body>
</html>
