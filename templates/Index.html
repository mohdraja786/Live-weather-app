<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लाइव वेदर ऐप</title>
    <!-- बूटस्ट्रैप 5 प्रीमियम लुक के लिए -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #4ca1af, #2c3e50);
            color: #white;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 15px;
        }
        .btn-search {
            background-color: #ff6b6b;
            color: white;
            border: none;
        }
        .btn-search:hover {
            background-color: #ff5252;
            color: white;
        }
    </style>
</head>
<body>

<div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh;">
    
    <div class="text-center mb-4 text-white">
        <h1 class="fw-bold">🌤️ Live Weather App</h1>
        <p class="text-white-50">किसी भी शहर का लाइव मौसम तुरंत जानें</p>
    </div>

    <!-- शहर खोजने का फॉर्म -->
    <div class="col-md-6 w-100" style="max-width: 500px;">
        <div class="bg-white p-3 rounded-pill shadow mb-4">
            <!-- अगर शहर का नाम गलत हो तो यह एरर दिखेगा -->
        {% if error %}
        <div class="alert alert-danger text-center rounded-pill shadow-sm" role="alert">
            ❌ {{ error }}
        </div>
        {% endif %}
            <form action="/" method="POST" class="d-flex">
                <input type="text" name="city" class="form-control border-0 rounded-pill px-3" placeholder="शहर का नाम लिखें (e.g. Muzaffarpur, Delhi)..." required>
                <button type="submit" class="btn btn-search rounded-pill px-4 ms-2 fw-bold">Search</button>
            </form>
        </div>

        <!-- अगर वेदर डेटा मौजूद है, तो यह कार्ड दिखेगा -->
        {% if weather %}
        <div class="weather-card p-4 text-center shadow-lg animate__animated animate__fadeIn">
            <h2 class="fw-bold mb-1">{{ weather.city.title() }}</h2>
            <p class="text-white-50 mb-4">मौसम का हाल</p>
            
            <div class="display-1 fw-bold mb-2">{{ weather.temp }}</div>
            <h4 class="text-capitalize mb-4">✨ {{ weather.desc }}</h4>
            
            <hr style="border-top: 1px solid rgba(255,255,255,0.2);">
            
            <div class="row mt-3">
                <div class="col-12">
                    <span class="text-white-50 small d-block">नमी (Humidity)</span>
                    <span class="fw-bold fs-5">💧 {{ weather.humidity }}</span>
                </div>
            </div>
        </div>
        {% endif %}
    </div>

</div>

</body>
</html>
